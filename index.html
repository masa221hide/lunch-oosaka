<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>大阪おすすめランチ</title>
<style>
  :root {
    /* グレーのパレット（明るい→暗い） */
    --gray-50:  #fafafa;
    --gray-100: #f4f4f5;
    --gray-200: #e4e4e7;
    --gray-300: #d4d4d8;
    --gray-400: #a1a1aa;
    --gray-500: #71717a;
    --gray-600: #52525b;
    --gray-700: #3f3f46;
    --gray-800: #27272a;
    --gray-900: #18181b;

    --bg: #ffffff;
    --bg2: #ffffff;
    --surface: var(--gray-50);
    --surface-2: var(--gray-100);
    --ink: var(--gray-900);
    --sub: var(--gray-500);
    --line: var(--gray-200);
    --line-soft: var(--gray-100);
    --accent: var(--gray-900);
    --accent-soft: var(--gray-100);
    --card-shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 4px 16px rgba(0, 0, 0, 0.02);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
      "Yu Gothic UI", "Meiryo", sans-serif;
    background: var(--gray-50);
    color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  /* ==========================================================
     ヘッダー背景画像
     lunch.jpg を index.html と同じフォルダに配置してください。
     GitHubリポジトリにも lunch.jpg をアップすれば公開サイトにも反映されます。
     別の写真に変えたい場合は background-image の URL を差し替えてください。
     ========================================================== */
  .hero {
    position: relative;
    background-color: var(--gray-900); /* 画像読込前/失敗時のフォールバック */
    background-image:
      linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.7) 100%),
      url('lunch.jpg');
    background-size: cover;
    background-position: center;
    color: #fff;
    padding: 96px 20px 80px;
    text-align: center;
    border-bottom: 1px solid var(--line-soft);
  }
  .hero h1 {
    margin: 0;
    font-size: 40px;
    font-weight: 700;
    letter-spacing: -0.01em;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.65), 0 1px 3px rgba(0, 0, 0, 0.5);
  }
  .hero h1 .emoji { display: none; }
  .hero p {
    margin: 12px 0 0;
    color: rgba(255, 255, 255, 0.95);
    font-size: 14px;
    letter-spacing: 0.05em;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.6);
  }
  main {
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 20px 120px;
  }
  .panel {
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 24px 24px 18px;
    box-shadow: var(--card-shadow);
    margin-bottom: 20px;
  }
  .panel h2 {
    margin: 0 0 18px;
    font-size: 13px;
    color: var(--sub);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .panel h2 .ctrl-right {
    float: right;
    font-weight: 500;
    font-size: 12px;
    text-transform: none;
    letter-spacing: 0;
  }
  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }
  .filter-row .label {
    width: 100%;
    font-size: 12px;
    color: var(--sub);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }
  .chip {
    border: 1px solid var(--line);
    background: var(--gray-50);
    color: var(--gray-700);
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    user-select: none;
    transition: all 0.12s ease;
    font-family: inherit;
  }
  .chip:hover {
    background: var(--gray-100);
    border-color: var(--gray-400);
    color: var(--ink);
  }
  .chip.active {
    background: var(--gray-800);
    border-color: var(--gray-800);
    color: #fff;
    font-weight: 500;
  }
  .gacha-btn {
    display: block;
    width: 100%;
    margin: 16px 0 0;
    padding: 18px;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    background: linear-gradient(180deg, var(--gray-800) 0%, var(--gray-900) 100%);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: 0.02em;
    font-family: inherit;
    box-shadow: 0 2px 6px rgba(24, 24, 27, 0.15), 0 1px 2px rgba(24, 24, 27, 0.1);
  }
  .gacha-btn:hover {
    background: linear-gradient(180deg, var(--gray-700) 0%, var(--gray-800) 100%);
    box-shadow: 0 4px 10px rgba(24, 24, 27, 0.2);
  }
  .gacha-btn:active { transform: scale(0.99); }
  .gacha-btn:disabled {
    background: var(--gray-300);
    cursor: not-allowed;
    box-shadow: none;
  }
  .result {
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 20px;
    box-shadow: var(--card-shadow);
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn {
    0% { opacity: 0; transform: translateY(6px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .result .badge {
    display: inline-block;
    background: var(--gray-100);
    color: var(--gray-700);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    margin-bottom: 14px;
    border: 1px solid var(--gray-200);
  }
  .result .name {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0 0 8px;
  }
  .result .meta {
    color: var(--sub);
    font-size: 13px;
    margin-bottom: 18px;
  }
  .result .hours {
    font-size: 13px;
    color: var(--gray-700);
    margin-bottom: 16px;
    padding: 12px 14px;
    background: var(--gray-50);
    border: 1px solid var(--gray-100);
    border-radius: 8px;
  }
  .result .hours strong {
    font-weight: 600;
    margin-right: 6px;
    color: var(--ink);
  }
  .result .hours strong + strong { margin-left: 14px; }
  .result .desc {
    font-size: 14px;
    color: var(--gray-700);
    padding: 0;
    margin-bottom: 4px;
    line-height: 1.7;
  }
  .link-row {
    margin-top: 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .link-btn {
    flex: 1;
    min-width: 140px;
    text-align: center;
    text-decoration: none;
    border: 1px solid var(--line);
    color: var(--gray-700);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.12s;
    background: #fff;
    font-family: inherit;
    cursor: pointer;
  }
  .link-btn:hover {
    background: var(--gray-50);
    border-color: var(--gray-400);
    color: var(--ink);
  }
  .link-btn .ico { margin-right: 4px; }
  .tag-list {
    margin-top: 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag {
    font-size: 12px;
    color: var(--gray-600);
    background: var(--gray-100);
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid var(--gray-200);
  }
  .count {
    font-size: 12px;
    color: var(--sub);
    text-align: right;
    margin-top: 12px;
  }
  .count strong { color: var(--ink); font-weight: 600; }
  .count .excluded { color: #aaa; margin-left: 8px; }
  .shop-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
  }
  .shop-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 13px;
    transition: all 0.15s;
  }
  .shop-card:hover {
    border-color: var(--gray-400);
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .shop-card.recent { opacity: 0.55; background: var(--gray-50); }
  .shop-card .sc-name { font-weight: 600; font-size: 14px; display: flex; justify-content: space-between; align-items: center; gap: 6px; }
  .shop-card .sc-sub { color: var(--sub); font-size: 12px; margin-top: 4px; line-height: 1.5; }
  .shop-card .sc-recent-badge {
    font-size: 10px;
    background: #e0e0e0;
    color: #555;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 500;
  }
  .link-mini {
    display: inline-block;
    color: var(--sub);
    text-decoration: none;
    font-size: 11px;
    margin-right: 10px;
    margin-top: 8px;
    border-bottom: 1px solid transparent;
  }
  .link-mini:hover { color: var(--ink); border-bottom-color: var(--ink); }
  footer {
    text-align: center;
    font-size: 11px;
    color: var(--sub);
    padding: 40px 20px;
    line-height: 1.7;
  }
  .empty {
    text-align: center;
    color: var(--sub);
    padding: 24px;
    font-size: 13px;
  }
  .history-panel {
    font-size: 13px;
  }
  .history-item {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--line-soft);
  }
  .history-item:last-child { border-bottom: none; }
  .history-date { color: var(--sub); font-size: 12px; }
  .clear-btn {
    background: none;
    border: 1px solid var(--line);
    color: var(--sub);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.12s;
  }
  .clear-btn:hover { color: var(--ink); border-color: var(--ink); }
</style>
</head>
<body>
<header class="hero">
  <h1>大阪おすすめランチ</h1>
  <p>大阪駅・グランフロント周辺、今日のお昼を選ぶ</p>
</header>
<main>

  <section class="panel">
    <h2>Filter</h2>

    <div class="filter-row" data-filter="price">
      <div class="label">予算</div>
      <button class="chip active" data-value="all">すべて</button>
      <button class="chip" data-value="800">〜800円</button>
      <button class="chip" data-value="1000">〜1,000円</button>
      <button class="chip" data-value="1500">〜1,500円</button>
    </div>

    <div class="filter-row" data-filter="genre">
      <div class="label">ジャンル</div>
      <button class="chip active" data-value="all">すべて</button>
      <button class="chip" data-value="和食">和食</button>
      <button class="chip" data-value="洋食">洋食</button>
      <button class="chip" data-value="中華">中華</button>
      <button class="chip" data-value="麺">ラーメン・うどん</button>
      <button class="chip" data-value="カレー">カレー</button>
      <button class="chip" data-value="アジア">アジア・その他</button>
    </div>

    <div class="filter-row" data-filter="location">
      <div class="label">場所</div>
      <button class="chip active" data-value="all">すべて</button>
      <button class="chip" data-value="grandfront">グランフロント内</button>
      <button class="chip" data-value="ekimae">駅前ビル系</button>
      <button class="chip" data-value="lucua">ルクア・うめきた</button>
      <button class="chip" data-value="other">その他梅田</button>
    </div>

    <div class="filter-row" data-filter="walk">
      <div class="label">徒歩の目安</div>
      <button class="chip active" data-value="all">すべて</button>
      <button class="chip" data-value="3">3分以内</button>
      <button class="chip" data-value="5">5分以内</button>
      <button class="chip" data-value="10">10分以内</button>
    </div>

    <div class="filter-row" data-filter="dayOpen">
      <div class="label">今日（<span id="todayLabel">-</span>）営業している店だけ</div>
      <button class="chip active" data-value="all">指定なし</button>
      <button class="chip" data-value="today">今日営業中のみ</button>
    </div>

    <div class="filter-row" data-filter="history">
      <div class="label">最近行った店を除外</div>
      <button class="chip" data-value="0">除外しない</button>
      <button class="chip active" data-value="7">直近7日</button>
      <button class="chip" data-value="14">直近14日</button>
      <button class="chip" data-value="30">直近30日</button>
    </div>

    <div class="count">
      該当: <strong id="matchCount">0</strong> 店
      <span class="excluded" id="excludedCount"></span>
    </div>
  </section>

  <button id="gachaBtn" class="gacha-btn">今日のランチを決める</button>

  <section id="resultArea" style="margin-top:18px"></section>

  <section class="panel history-panel">
    <h2>History
      <span class="ctrl-right">
        <button class="clear-btn" id="clearHistory">履歴をクリア</button>
      </span>
    </h2>
    <div id="historyList"></div>
  </section>

  <section class="panel">
    <h2>Shops</h2>
    <div id="shopList" class="shop-list"></div>
  </section>

</main>
<footer>
  ※データは公開情報（一休.com、食べログ、ホットペッパー等）を参考にしたサンプルです。<br>
  営業時間・定休日・価格は変わることがあるため、訪問前に各店舗の公式情報をご確認ください。
</footer>

/* =========================================================
 * フィルタ・ヘルパ
 * ========================================================= */
const filters = { price:"all", genre:"all", location:"all", walk:"all", dayOpen:"all", history:"7" };

const DOW_KEY = ["sun","mon","tue","wed","thu","fri","sat"];
const DOW_JA  = ["日","月","火","水","木","金","土"];

function todayKey() {
  return DOW_KEY[new Date().getDay()];
}
function todayJa() {
  return DOW_JA[new Date().getDay()];
}
function isOpenToday(shop) {
  return !!shop.hours[todayKey()];
}
function todayHours(shop) {
  return shop.hours[todayKey()] || "本日休業";
}

/* =========================================================
 * 履歴（localStorage）— 「行ってきた」で記録
 * フォールバック: メモリ内
 * ========================================================= */
const HISTORY_KEY = "lunch-gacha-history-v1";
let memoryHistory = [];
function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if (!raw) return [];
    return JSON.parse(raw);
  } catch(e) {
    return memoryHistory;
  }
}
function saveHistory(list) {
  try {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
  } catch(e) {
    memoryHistory = list;
  }
}
function pushHistory(name) {
  const list = loadHistory();
  list.unshift({ name, ts: Date.now() });
  // 直近50件まで
  saveHistory(list.slice(0, 50));
  renderHistory();
  refreshList();
}
function clearHistory() {
  saveHistory([]);
  renderHistory();
  refreshList();
}
function recentNames(days) {
  if (!days || days === "0") return new Set();
  const cutoff = Date.now() - Number(days)*24*60*60*1000;
  return new Set(loadHistory().filter(h => h.ts >= cutoff).map(h => h.name));
}

/* =========================================================
 * URL ビルダ（食べログ検索・Googleマップ検索）
 * ========================================================= */
function tabelogUrl(shop) {
  const q = encodeURIComponent(shop.name + " " + shop.where);
  return `https://tabelog.com/rstLst/?sw=${q}`;
}
function mapUrl(shop) {
  const q = encodeURIComponent(shop.name + " " + shop.where + " 大阪");
  return `https://www.google.com/maps/search/?api=1&query=${q}`;
}

/* =========================================================
 * チップ挙動
 * ========================================================= */
document.querySelectorAll(".filter-row").forEach(row => {
  const name = row.dataset.filter;
  row.querySelectorAll(".chip").forEach(chip => {
    chip.addEventListener("click", () => {
      row.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      filters[name] = chip.dataset.value;
      refreshList();
    });
  });
});

function matches(shop, excludeSet) {
  if (filters.price !== "all" && shop.price > Number(filters.price)) return false;
  if (filters.genre !== "all" && shop.genre !== filters.genre) return false;
  if (filters.location !== "all" && shop.location !== filters.location) return false;
  if (filters.walk !== "all" && shop.walk > Number(filters.walk)) return false;
  if (filters.dayOpen === "today" && !isOpenToday(shop)) return false;
  if (excludeSet && excludeSet.has(shop.name)) return false;
  return true;
}

function refreshList() {
  const excludeSet = recentNames(filters.history);
  // 基本条件（履歴以外）に合う店
  const baseList = shops.filter(s => matches(s, null));
  // 履歴除外も含めた「ガチャ対象」
  const pickable = baseList.filter(s => !excludeSet.has(s.name));

  document.getElementById("matchCount").textContent = pickable.length;
  const excludedLen = baseList.length - pickable.length;
  document.getElementById("excludedCount").textContent =
    excludedLen > 0 ? `（履歴から ${excludedLen}店 除外）` : "";

  const container = document.getElementById("shopList");
  if (baseList.length === 0) {
    container.innerHTML = '<div class="empty">条件に合うお店がありません。条件をゆるめてみてください。</div>';
  } else {
    container.innerHTML = baseList.map(s => {
      const isRecent = excludeSet.has(s.name);
      return `
        <div class="shop-card ${isRecent ? "recent" : ""}">
          <div class="sc-name">
            <span>${s.name}</span>
            ${isRecent ? '<span class="sc-recent-badge">最近行った</span>' : ''}
          </div>
          <div class="sc-sub">${s.where}<br>${s.genre} ／ ¥${s.price.toLocaleString()}〜 ／ 徒歩${s.walk}分</div>
          <div class="sc-sub">本日: ${todayHours(s)}　定休: ${s.closedNote}</div>
          <div>
            <a class="link-mini" href="${tabelogUrl(s)}" target="_blank" rel="noopener">食べログ →</a>
            <a class="link-mini" href="${mapUrl(s)}" target="_blank" rel="noopener">地図 →</a>
          </div>
        </div>
      `;
    }).join("");
  }
  document.getElementById("gachaBtn").disabled = pickable.length === 0;
  document.getElementById("gachaBtn").textContent =
    pickable.length === 0 ? "条件に合う店がありません" : "今日のランチを決める";
}

/* =========================================================
 * ガチャ
 * ========================================================= */
document.getElementById("gachaBtn").addEventListener("click", () => {
  const excludeSet = recentNames(filters.history);
  const list = shops.filter(s => matches(s, excludeSet));
  if (list.length === 0) return;
  const pick = list[Math.floor(Math.random() * list.length)];
  renderResult(pick);
});

function renderResult(pick) {
  const area = document.getElementById("resultArea");
  area.innerHTML = `
    <div class="result">
      <span class="badge">今日はココ</span>
      <div class="name">${pick.name}</div>
      <div class="meta">${pick.where}　／　${pick.genre}　／　¥${pick.price.toLocaleString()}〜　／　徒歩${pick.walk}分</div>
      <div class="hours">
        <strong>本日(${todayJa()})の営業:</strong> ${todayHours(pick)}
        <strong>定休日:</strong> ${pick.closedNote}
      </div>
      <div class="desc">${pick.desc}</div>
      <div class="tag-list">
        ${pick.tags.map(t => `<span class="tag">#${t}</span>`).join("")}
      </div>
      <div class="link-row">
        <a class="link-btn" href="${tabelogUrl(pick)}" target="_blank" rel="noopener">
          食べログで見る
        </a>
        <a class="link-btn" href="${mapUrl(pick)}" target="_blank" rel="noopener">
          地図で見る
        </a>
        <button class="link-btn" id="visitedBtn">
          行ってきた
        </button>
        <button class="link-btn" id="rerollBtn">
          もう一回
        </button>
      </div>
    </div>
  `;
  document.getElementById("visitedBtn").addEventListener("click", () => {
    pushHistory(pick.name);
    document.getElementById("visitedBtn").textContent = "履歴に追加しました";
    document.getElementById("visitedBtn").disabled = true;
  });
  document.getElementById("rerollBtn").addEventListener("click", () => {
    document.getElementById("gachaBtn").click();
  });
  area.scrollIntoView({ behavior: "smooth", block: "start" });
}

/* =========================================================
 * 履歴UI
 * ========================================================= */
function renderHistory() {
  const list = loadHistory();
  const el = document.getElementById("historyList");
  if (list.length === 0) {
    el.innerHTML = '<div class="empty" style="padding:8px">まだ履歴はありません。ガチャで店を決めたら「行ってきた！」ボタンで記録できます。</div>';
    return;
  }
  const fmt = ts => {
    const d = new Date(ts);
    return `${d.getMonth()+1}/${d.getDate()}(${DOW_JA[d.getDay()]})`;
  };
  el.innerHTML = list.slice(0, 10).map(h => `
    <div class="history-item">
      <span>${h.name}</span>
      <span class="history-date">${fmt(h.ts)}</span>
    </div>
  `).join("");
}
document.getElementById("clearHistory").addEventListener("click", () => {
  if (confirm("履歴をすべて消去します。よろしいですか？")) clearHistory();
});

/* =========================================================
 * 初期化
 * ========================================================= */
document.getElementById("todayLabel").textContent = todayJa() + "曜日";
renderHistory();
refreshList();
</script>
